<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="45%">
      <stop offset="0%" stop-color="#C9A97A" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#C9A97A" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#C9A97A" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.7" fill="#C9A97A" fill-opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#dots)"/>
  <rect width="600" height="800" fill="url(#glow)"/>
  <g opacity="0.9">
    <ellipse cx="300" cy="320" rx="115" ry="155" fill="#1f1814" stroke="#C9A97A" stroke-opacity="0.35" stroke-width="1.2"/>
    <line x1="300" y1="475" x2="300" y2="700" stroke="#C9A97A" stroke-opacity="0.3" stroke-width="1.2"/>
    <line x1="180" y1="700" x2="420" y2="700" stroke="#C9A97A" stroke-opacity="0.3" stroke-width="1.2"/>
  </g>
  <text x="300" y="765" text-anchor="middle" fill="#C9A97A" fill-opacity="0.55" font-family="serif" font-size="11" letter-spacing="6">FOTO DA DRA. LARA</text>
</svg>
